
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Extensions — Momentum</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f5;
  --surface: rgba(255,255,255,0.75);
  --surface-strong: rgba(255,255,255,0.92);
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.13);
  --text: #0f1117;
  --text-2: #4a5060;
  --text-3: #8890a0;
  --green: #22c55e;
  --green-text: #15803d;
  --radius-xl: 1rem;
  --radius-2xl: 1.25rem;
  --shadow-glass: 0 10px 30px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.3);
  --shadow-soft: 0 8px 20px rgba(0,0,0,0.06);
  --nav-bg: rgba(255,255,255,0.82);
  --nav-border: rgba(0,0,0,0.08);
  --tint1: rgba(139,92,246,0.07);
  --tint2: rgba(99,102,241,0.05);
}
.dark {
  --bg: #0e0f14;
  --surface: rgba(255,255,255,0.05);
  --surface-strong: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.09);
  --border-strong: rgba(255,255,255,0.15);
  --text: #f0f2f8;
  --text-2: #9aa0b8;
  --text-3: #565d78;
  --green-text: #4ade80;
  --shadow-glass: 0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.07);
  --shadow-soft: 0 8px 20px rgba(0,0,0,0.3);
  --nav-bg: rgba(14,15,20,0.88);
  --nav-border: rgba(255,255,255,0.08);
  --tint1: rgba(139,92,246,0.1);
  --tint2: rgba(99,102,241,0.07);
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 40% at 50% -10%, var(--tint1) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 85% 90%, var(--tint2) 0%, transparent 60%);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-top: 4.5rem;
  padding-bottom: 5rem;
  padding-left: 1.25rem;
  padding-right: 1.25rem;
  transition: background 300ms ease, color 300ms ease;
}

/* NAVBAR */
.site-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--nav-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.07);
  transition: background 300ms ease, border-color 300ms ease;
}
.dark .site-nav { box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.nav-inner {
  max-width: 960px; margin: 0 auto; padding: 0 1.25rem;
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; gap: 1rem; position: relative;
}
.nav-inner::before {
  content: ''; position: absolute;
  top: -8px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 50px;
  background: radial-gradient(ellipse, rgba(139,92,246,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.nav-brand-wrap { display: flex; align-items: center; gap: 0.65rem; }
.nav-brand-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #8b5cf6, #6366f1, #4f46e5);
  box-shadow: 0 4px 12px rgba(99,102,241,0.3);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.nav-brand-icon svg { width: 15px; height: 15px; stroke: white; stroke-width: 1.75; fill: none; }
.nav-brand-text { font-weight: 600; font-size: 0.92rem; color: var(--text); }
.nav-right { display: flex; align-items: center; gap: 0.5rem; }
.dark-toggle {
  width: 36px; height: 36px; border-radius: 999px;
  background: transparent; border: 1px solid var(--border-strong);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 150ms ease, transform 150ms ease; flex-shrink: 0;
}
.dark-toggle:hover { background: var(--surface-strong); transform: scale(1.06); }
.dark-toggle svg { width: 15px; height: 15px; stroke: var(--text-2); stroke-width: 2; fill: none; }
.dark-toggle .icon-sun { display: none; }
.dark-toggle .icon-moon { display: block; }
.dark .dark-toggle .icon-sun { display: block; }
.dark .dark-toggle .icon-moon { display: none; }

.wrap { max-width: 960px; margin: 0 auto; }

/* BANNER */
.banner {
  background: var(--surface); backdrop-filter: blur(12px);
  border: 1px solid var(--border); box-shadow: var(--shadow-glass);
  border-radius: var(--radius-2xl); padding: 2.5rem 2.75rem;
  margin-bottom: 1.25rem; position: relative; overflow: hidden;
}
.banner::before {
  content: ''; position: absolute;
  top: -40px; left: 50%; transform: translateX(-50%);
  width: 340px; height: 120px;
  background: radial-gradient(ellipse, rgba(139,92,246,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.dark .banner { background: rgba(255,255,255,0.04); }
.banner-inner { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
.banner-icon {
  width: 64px; height: 64px; border-radius: 16px; flex-shrink: 0;
  background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 50%, #4f46e5 100%);
  box-shadow: 0 8px 24px rgba(99,102,241,0.28), inset 0 1px 0 rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
}
.banner-icon svg { width: 28px; height: 28px; stroke: white; stroke-width: 1.75; fill: none; }
.banner-text { flex: 1; }
.banner-tag {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: var(--text); color: var(--bg);
  font-size: 0.68rem; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.3rem 0.75rem; border-radius: 999px; margin-bottom: 0.75rem;
}
.banner h1 { font-size: 1.85rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 0.35rem; }
.gradient-text {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.banner p { color: var(--text-2); font-size: 0.92rem; font-weight: 300; line-height: 1.7; }
.banner p strong { font-weight: 600; color: var(--green-text); }

/* TOOLBAR */
.toolbar {
  display: flex; gap: 0.75rem; align-items: center;
  margin-bottom: 1.1rem; flex-wrap: wrap;
}
.search-wrap {
  flex: 1; min-width: 180px; position: relative;
}
.search-wrap svg {
  position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; stroke: var(--text-3); stroke-width: 2; fill: none; pointer-events: none;
}
.search-input {
  width: 100%; border-radius: 999px; padding: 0.6rem 1rem 0.6rem 2.5rem;
  font-size: 0.875rem; font-family: 'DM Sans', sans-serif;
  background: var(--surface-strong); border: 1px solid var(--border-strong);
  color: var(--text); outline: none;
  transition: border-color 200ms ease, box-shadow 200ms ease;
  backdrop-filter: blur(8px);
}
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: rgba(99,102,241,0.45); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.count-badge {
  display: inline-flex; align-items: center; gap: 0.35rem;
  background: var(--surface-strong); border: 1px solid var(--border-strong);
  border-radius: 999px; padding: 0.5rem 1rem;
  font-size: 0.78rem; color: var(--text-2); font-family: 'DM Mono', monospace;
  white-space: nowrap; backdrop-filter: blur(8px);
}

/* EXT GRID */
.ext-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}

/* EXT CARD */
.ext-card {
  background: var(--surface); backdrop-filter: blur(12px);
  border: 1px solid var(--border); box-shadow: var(--shadow-glass);
  border-radius: var(--radius-xl);
  display: flex; flex-direction: column;
  transition: transform 250ms ease, box-shadow 250ms ease;
  overflow: hidden; text-decoration: none; color: inherit;
  cursor: pointer;
}
.ext-card:hover {
  transform: scale(1.02) translateY(-2px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.4);
}
.dark .ext-card:hover {
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
}

.ext-img-wrap {
  height: 120px;
  background: var(--surface-strong);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0; position: relative;
}
.ext-img-wrap img {
  max-width: 80px; max-height: 80px; object-fit: contain;
  transition: transform 250ms ease;
}
.ext-card:hover .ext-img-wrap img { transform: scale(1.08); }
.ext-img-placeholder {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, #8b5cf6, #6366f1, #4f46e5);
  box-shadow: 0 6px 18px rgba(99,102,241,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
}
.ext-img-placeholder svg { width: 22px; height: 22px; stroke: white; stroke-width: 1.75; fill: none; }

.ext-body { padding: 1.25rem 1.4rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
.ext-name { font-size: 0.97rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text); }
.ext-by {
  font-size: 0.72rem; color: var(--text-3); font-weight: 400;
  display: flex; align-items: center; gap: 0.3rem;
}
.ext-by svg { width: 11px; height: 11px; stroke: var(--text-3); stroke-width: 2; fill: none; }
.ext-desc { font-size: 0.81rem; font-weight: 300; color: var(--text-2); line-height: 1.65; flex: 1; margin-top: 0.25rem; }

.ext-footer {
  padding: 0.75rem 1.4rem;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.ext-slug {
  font-family: 'DM Mono', monospace; font-size: 0.67rem; color: rgba(99,102,241,0.75);
}
.dark .ext-slug { color: rgba(165,180,252,0.75); }
.ext-arrow {
  width: 28px; height: 28px; border-radius: 999px;
  background: var(--surface-strong); border: 1px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  transition: background 150ms ease, transform 150ms ease;
}
.ext-card:hover .ext-arrow { background: #111; transform: translateX(2px); }
.dark .ext-card:hover .ext-arrow { background: #f0f2f8; }
.ext-arrow svg { width: 13px; height: 13px; stroke: var(--text-2); stroke-width: 2; fill: none; transition: stroke 150ms ease; }
.ext-card:hover .ext-arrow svg { stroke: #fff; }
.dark .ext-card:hover .ext-arrow svg { stroke: #0e0f14; }

/* STATES */
.state-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.75rem; padding: 4rem 1.5rem; text-align: center; color: var(--text-3);
}
.state-center svg { width: 36px; height: 36px; stroke: var(--text-3); stroke-width: 1.5; fill: none; }
.state-center p { font-size: 0.88rem; font-weight: 300; max-width: 300px; line-height: 1.65; }

.spinner {
  width: 36px; height: 36px; border: 2.5px solid var(--border-strong);
  border-top-color: #8b5cf6; border-radius: 999px;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FADE IN */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeUp 0.45s cubic-bezier(0.25,0.1,0.25,1) both; }
.delay-1 { animation-delay: 70ms; }
.delay-2 { animation-delay: 140ms; }

/* HIDDEN */
.hidden { display: none !important; }

@media (max-width: 600px) {
  .banner { padding: 1.75rem 1.25rem; }
  .banner h1 { font-size: 1.5rem; }
  .banner-icon { width: 50px; height: 50px; }
  .banner-icon svg { width: 22px; height: 22px; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <div class="nav-brand-wrap">
      <div class="nav-brand-icon">
        <svg data-feather="zap" style="width:15px;height:15px;stroke:white;stroke-width:1.75;fill:none"></svg>
      </div>
      <span class="nav-brand-text">Momentum</span>
    </div>
    <div class="nav-right">
      <button class="dark-toggle" id="dark-toggle" title="Toggle dark mode" onclick="toggleDark()">
        <svg class="icon-moon" data-feather="moon"></svg>
        <svg class="icon-sun" data-feather="sun"></svg>
      </button>
    </div>
  </div>
</nav>

<div class="wrap">

  <div class="banner animate-in">
    <div class="banner-inner">
      <div class="banner-icon">
        <svg data-feather="layers" style="width:28px;height:28px;stroke:white;stroke-width:1.75;fill:none"></svg>
      </div>
      <div class="banner-text">
        <div class="banner-tag">
          <svg data-feather="grid" style="width:10px;height:10px;stroke:currentColor;stroke-width:2.5;fill:none"></svg>
          Momentum Extensions
        </div>
        <h1><span class="gradient-text">Extensions</span></h1>
        <p>Browse all available extensions for <strong>Momentum</strong>. Click any card to open it in the editor.</p>
      </div>
    </div>
  </div>

  <div class="toolbar animate-in delay-1">
    <div class="search-wrap">
      <svg data-feather="search"></svg>
      <input class="search-input" id="search" type="text" placeholder="Search extensions…" oninput="filterCards()" autocomplete="off" />
    </div>
    <div class="count-badge" id="count-badge">
      <svg data-feather="layers" style="width:13px;height:13px;stroke:var(--text-3);stroke-width:2;fill:none"></svg>
      <span id="count-label">loading…</span>
    </div>
  </div>

  <div class="ext-grid animate-in delay-2" id="ext-grid">
    <div class="state-center" id="loading-state">
      <div class="spinner"></div>
      <p>Fetching extensions…</p>
    </div>
  </div>

  <div class="state-center hidden" id="empty-state">
    <svg data-feather="search"></svg>
    <p>No extensions match your search. Try a different keyword.</p>
  </div>

</div>

<script>
function toggleDark() {
  document.body.classList.toggle('dark');
  if (window.feather) feather.replace({ 'stroke-width': 1.75 });
}

let allExtensions = [];

// Build the full absolute URL for an extension file given its slug.
// The slug from the JSON (e.g. "lab/text") maps to a .js file relative
// to the current page's origin + path, then that full URL is passed as
// the ?extension= query param to /scratch-gui.
function extFileUrl(slug) {
  // Extension JS files live next to the JSON, under the same base.
  // Construct an absolute URL so /scratch-gui can receive it unambiguously.
  const base = new URL(slug + '.js', window.location.href);
  return base.href;
}

function buildCard(ext) {
  const authors = (ext.by || []).map(a => a.name).join(', ') || 'Unknown';

  // Full absolute URL to the extension JS file
  const fileUrl = extFileUrl(ext.slug || '');
  // Editor URL: /scratch-gui?extension=<encoded absolute url>
  const href = ext.slug
    ? '/scratch-gui?extension=' + encodeURIComponent(fileUrl)
    : '#';

  const imgHtml = ext.image
    ? `<img src="${ext.image}" alt="${esc(ext.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="ext-img-placeholder" style="display:none"><svg data-feather="puzzle" style="width:22px;height:22px;stroke:white;stroke-width:1.75;fill:none"></svg></div>`
    : `<div class="ext-img-placeholder"><svg data-feather="puzzle" style="width:22px;height:22px;stroke:white;stroke-width:1.75;fill:none"></svg></div>`;

  return `
    <a class="ext-card" href="${esc(href)}" target="_blank" rel="noopener"
       data-name="${esc(ext.name.toLowerCase())}"
       data-desc="${esc((ext.description || '').toLowerCase())}"
       data-slug="${esc((ext.slug || '').toLowerCase())}">
      <div class="ext-img-wrap">${imgHtml}</div>
      <div class="ext-body">
        <div class="ext-name">${esc(ext.name)}</div>
        <div class="ext-by">
          <svg data-feather="user" style="width:11px;height:11px"></svg>
          ${esc(authors)}
        </div>
        <div class="ext-desc">${esc(ext.description || '')}</div>
      </div>
      <div class="ext-footer">
        <span class="ext-slug">${esc(ext.slug || '')}</span>
        <div class="ext-arrow"><svg data-feather="arrow-right" style="width:13px;height:13px"></svg></div>
      </div>
    </a>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateCount(shown, total) {
  const el = document.getElementById('count-label');
  el.textContent = shown === total ? `${total} extensions` : `${shown} / ${total}`;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.ext-card');
  let shown = 0;
  cards.forEach(card => {
    const match = !q ||
      card.dataset.name.includes(q) ||
      card.dataset.desc.includes(q) ||
      card.dataset.slug.includes(q);
    card.classList.toggle('hidden', !match);
    if (match) shown++;
  });
  updateCount(shown, allExtensions.length);
  document.getElementById('empty-state').classList.toggle('hidden', shown > 0);
}

async function loadExtensions() {
  const grid = document.getElementById('ext-grid');
  const loadingState = document.getElementById('loading-state');
  try {
    const res = await fetch('generated-metadata/extensions-v0.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allExtensions = data.extensions || [];

    loadingState.remove();
    grid.innerHTML = allExtensions.map(buildCard).join('');
    if (window.feather) feather.replace({ 'stroke-width': 1.75 });
    updateCount(allExtensions.length, allExtensions.length);
  } catch (err) {
    loadingState.innerHTML = `
      <svg data-feather="alert-circle" style="width:36px;height:36px;stroke:var(--text-3);stroke-width:1.5;fill:none"></svg>
      <p>Could not load extensions.<br><span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text-3)">${err.message}</span></p>`;
    if (window.feather) feather.replace({ 'stroke-width': 1.75 });
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.feather) feather.replace({ 'stroke-width': 1.75 });
  loadExtensions();
});
</script>
</body>
</html>
